<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Interaction Lab</title>
</head>
<body>
    <div id="global-header"></div>

    <div class="container">
        <div class="page-header">
            <h1>Contact Us</h1>
        </div>

        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap:40px; margin-top:40px;">
            <div style="border-radius:24px; overflow:hidden; box-shadow:0 10px 30px rgba(0,0,0,0.05); height:400px;">
                <iframe src="https://maps.app.goo.gl/6qAqJf7VzKif4fX48"
                width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
            </div>

            <div style="background:#fff; padding:40px; border-radius:24px; box-shadow:0 10px 30px rgba(0,0,0,0.05);">
                <h3 style="margin-top:0; color:var(--primary); font-size:1.5rem;">Address</h3>
                <p style="font-size:1.1rem; color:#444; margin-bottom:30px;">
                    Engineering Building 4, Room 125<br>
                    77 Cheongam-Ro, Nam-Gu, Pohang, Gyeongbuk<br>
                    37673, Republic of Korea
                </p>

                <h3 style="color:var(--primary); font-size:1.5rem;">Email</h3>
                <p style="font-size:1.1rem; color:#444;">choism@postech.ac.kr</p>

                <h3 style="color:var(--primary); font-size:1.5rem; margin-top:30px;">Phone</h3>
                <p style="font-size:1.1rem; color:#444;">+82-54-279-2228</p>
            </div>
        </div>
    </div>

    <div id="global-footer"></div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
